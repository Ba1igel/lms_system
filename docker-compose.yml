services:
  main-db:
    image: postgres:15-alpine
    container_name: main_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: lms_main
      POSTGRES_MULTIPLE_DATABASES: lms_main,keycloak
    ports:
      - "5432:5432"
    volumes:
      - main_db_data:/var/lib/postgresql/data
      - ./scripts/create-multiple-dbs.sh:/docker-entrypoint-initdb.d/create-multiple-dbs.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  main-service:
    build:
      context: ./Main_service
      dockerfile: Dockerfile
    container_name: main_service
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    depends_on:
      main-db:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped

  user-service:
    build:
      context: ./User_service
      dockerfile: Dockerfile
    container_name: user_service
    ports:
      - "8081:8081"
    env_file:
      - ./.env
    environment:
      APP_PORT: "8081"
    depends_on:
      keycloak:
        condition: service_started
    restart: unless-stopped

  keycloak:
    image: keycloak/keycloak:25.0
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://main-db:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgrespassword
    ports:
      - "8082:8080"
    depends_on:
      main-db:
        condition: service_healthy
    command: start-dev
    restart: unless-stopped

volumes:
  main_db_data:
